<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"/><meta content="width=device-width,initial-scale=1" name="viewport"/><title>智能座舱法规设计知识库</title><style>
:root{
  --navy:#142d4c;
  --navy-2:#1d3f66;
  --blue:#2f75b5;
  --blue-soft:#eaf3f8;
  --green-soft:#eef6ec;
  --yellow-soft:#fff8e6;
  --surface:#fff;
  --bg:#f4f6f8;
  --line:#dfe5ec;
  --line-2:#cbd5e1;
  --text:#172033;
  --muted:#687386;
  --red:#c93737;
  --amber:#bb7a00;
  --green:#28815f;
  --radius:12px;
  --shadow:0 8px 28px rgba(21,45,76,.08);
}
*{
  box-sizing:border-box;
}
html,body{
  height:100%;
  margin:0;
  font-family:"Microsoft YaHei","PingFang SC","Noto Sans SC",Arial,sans-serif;
  color:var(--text);
  background:var(--bg);
}
button,input,select{
  font:inherit;
}
button{
  cursor:pointer;
}
.hidden{
  display:none !important;
}
.app{
  display:grid;
  grid-template-columns:224px minmax(0,1fr);
  height:100vh;
  overflow:hidden;
}
.sidebar{
  background:var(--navy);
  color:#fff;
  display:flex;
  flex-direction:column;
  padding:20px 14px 14px;
}
.brand{
  display:flex;
  align-items:center;
  gap:11px;
  padding:4px 8px 22px;
}
.brand-mark{
  width:36px;
  height:36px;
  border-radius:9px;
  background:linear-gradient(145deg,#4d9ad8,#2f75b5);
  display:grid;
  place-items:center;
  font-weight:800;
}
.brand h1{
  font-size:14px;
  line-height:1.35;
  margin:0;
}
.brand small{
  color:#aebed0;
  font-size:10px;
}
.nav{
  display:grid;
  gap:6px;
}
.nav-btn{
  border:0;
  background:transparent;
  color:#c7d2df;
  padding:11px 12px;
  border-radius:8px;
  display:flex;
  align-items:center;
  gap:10px;
  text-align:left;
}
.nav-btn:hover{
  background:rgba(255,255,255,.08);
  color:#fff;
}
.nav-btn.active{
  background:#fff;
  color:var(--navy);
  font-weight:700;
}
.nav-ico{
  width:19px;
  text-align:center;
}
.side-meta{
  margin-top:auto;
  border-top:1px solid rgba(255,255,255,.14);
  padding:14px 8px 2px;
  color:#aebed0;
  font-size:11px;
  line-height:1.8;
}
.side-meta b{
  color:#fff;
  font-weight:600;
}
.shell{
  display:grid;
  grid-template-rows:64px minmax(0,1fr);
  min-width:0;
}
.topbar{
  background:#fff;
  border-bottom:1px solid var(--line);
  display:flex;
  align-items:center;
  gap:18px;
  padding:0 22px;
}
.global-search{
  flex:1;
  max-width:680px;
  position:relative;
}
.global-search input{
  width:100%;
  height:40px;
  border:1px solid var(--line-2);
  border-radius:9px;
  padding:0 42px 0 38px;
  background:#f8fafc;
  outline:0;
}
.global-search input:focus{
  border-color:var(--blue);
  background:#fff;
  box-shadow:0 0 0 3px rgba(47,117,181,.12);
}
.search-icon{
  position:absolute;
  left:13px;
  top:10px;
  color:var(--muted);
}
.kbd{
  position:absolute;
  right:10px;
  top:9px;
  border:1px solid var(--line);
  border-radius:5px;
  padding:2px 5px;
  font-size:10px;
  color:var(--muted);
  background:#fff;
}
.top-actions{
  margin-left:auto;
  display:flex;
  gap:8px;
}
.icon-btn{
  width:38px;
  height:38px;
  border:1px solid var(--line);
  background:#fff;
  border-radius:9px;
  display:grid;
  place-items:center;
  color:var(--muted);
}
.main{
  overflow:auto;
  min-width:0;
}
.view{
  display:none;
  min-height:100%;
  padding:26px;
}
.view.active{
  display:block;
}
.page-head{
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  gap:20px;
  margin-bottom:22px;
}
.page-head h2{
  margin:0;
  font-size:25px;
  letter-spacing:-.5px;
}
.page-head p{
  margin:7px 0 0;
  color:var(--muted);
  font-size:13px;
}
.count-pill{
  background:#fff;
  border:1px solid var(--line);
  border-radius:999px;
  padding:7px 12px;
  color:var(--muted);
  font-size:12px;
}
.hero{
  background:linear-gradient(135deg,var(--navy),#234f7d);
  border-radius:16px;
  color:#fff;
  padding:34px 38px;
  box-shadow:var(--shadow);
  position:relative;
  overflow:hidden;
}
.hero:after{
  content:"";
  position:absolute;
  width:300px;
  height:300px;
  border:60px solid rgba(255,255,255,.045);
  border-radius:50%;
  right:-80px;
  top:-130px;
}
.hero h2{
  font-size:29px;
  margin:0 0 9px;
}
.hero p{
  color:#d7e2ee;
  margin:0 0 22px;
}
.hero-search{
  display:flex;
  max-width:720px;
  background:#fff;
  border-radius:10px;
  padding:5px;
  position:relative;
  z-index:1;
}
.hero-search input{
  flex:1;
  border:0;
  outline:0;
  padding:0 14px;
  font-size:14px;
}
.hero-search button{
  border:0;
  background:var(--blue);
  color:#fff;
  border-radius:7px;
  padding:12px 20px;
  font-weight:700;
}
.quick-tags{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:16px;
  position:relative;
  z-index:1;
}
.quick-tags button{
  border:1px solid rgba(255,255,255,.2);
  color:#fff;
  background:rgba(255,255,255,.09);
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
}
.stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:14px;
  margin:18px 0;
}
.stat{
  background:#fff;
  border:1px solid var(--line);
  border-radius:12px;
  padding:18px;
}
.stat .label{
  color:var(--muted);
  font-size:12px;
}
.stat strong{
  display:block;
  font-size:27px;
  margin:7px 0 2px;
}
.stat small{
  color:var(--muted);
}
.section-title{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:25px 0 12px;
}
.section-title h3{
  margin:0;
  font-size:16px;
}
.text-btn{
  border:0;
  background:transparent;
  color:var(--blue);
  font-size:12px;
}
.domain-grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:12px;
}
.domain-card{
  background:#fff;
  border:1px solid var(--line);
  border-radius:12px;
  padding:16px;
  text-align:left;
  transition:.18s;
}
.domain-card:hover{
  transform:translateY(-2px);
  border-color:#a8c5df;
  box-shadow:var(--shadow);
}
.domain-card b{
  display:block;
  font-size:14px;
}
.domain-card span{
  font-size:11px;
  color:var(--muted);
}
.mini-icons{
  display:flex;
  height:36px;
  align-items:center;
  margin-bottom:11px;
}
.mini-icons img{
  width:34px;
  height:34px;
  object-fit:contain;
  background:#f8fafc;
  border:1px solid var(--line);
  border-radius:7px;
  margin-right:-5px;
  padding:4px;
}
.mini-placeholder{
  width:34px;
  height:34px;
  border-radius:7px;
  background:var(--blue-soft);
  display:grid;
  place-items:center;
  color:var(--blue);
  font-weight:800;
}
.question-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}
.question-card{
  background:#fff;
  border:1px solid var(--line);
  border-radius:11px;
  padding:15px;
  text-align:left;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.question-card:hover{
  border-color:var(--blue);
}
.question-card span{
  font-size:13px;
}
.question-card i{
  font-style:normal;
  color:var(--blue);
}
.library-layout{
  display:grid;
  grid-template-columns:220px minmax(390px,1fr) 390px;
  gap:14px;
  min-height:calc(100vh - 135px);
}
.filter-panel,.list-panel,.detail-panel{
  background:#fff;
  border:1px solid var(--line);
  border-radius:12px;
  min-width:0;
}
.filter-panel{
  padding:16px;
  overflow:auto;
}
.filter-title{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:14px;
}
.filter-title b{
  font-size:14px;
}
.filter-title button{
  border:0;
  background:transparent;
  color:var(--blue);
  font-size:11px;
}
.filter-group{
  padding:13px 0;
  border-top:1px solid var(--line);
}
.filter-group:first-of-type{
  border-top:0;
}
.filter-group h4{
  margin:0 0 9px;
  font-size:12px;
}
.filter-options{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
}
.filter-chip{
  border:1px solid var(--line);
  background:#fff;
  color:#536174;
  border-radius:7px;
  padding:6px 8px;
  font-size:11px;
}
.filter-chip.active{
  background:var(--blue-soft);
  color:#1d5f96;
  border-color:#8eb6d7;
  font-weight:700;
}
.list-panel{
  display:flex;
  flex-direction:column;
  overflow:hidden;
}
.list-toolbar{
  height:54px;
  border-bottom:1px solid var(--line);
  padding:0 15px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.list-toolbar b{
  font-size:13px;
}
.list-toolbar select{
  border:1px solid var(--line);
  border-radius:7px;
  padding:6px 8px;
  color:var(--muted);
  background:#fff;
  font-size:11px;
}
.rule-list{
  overflow:auto;
  padding:8px;
}
.rule-item{
  display:grid;
  grid-template-columns:64px minmax(0,1fr);
  gap:12px;
  padding:13px;
  border:1px solid transparent;
  border-radius:10px;
  cursor:pointer;
}
.rule-item:hover{
  background:#f7fafc;
}
.rule-item.active{
  border-color:#8eb6d7;
  background:#f2f8fc;
}
.rule-icon{
  width:64px;
  height:64px;
  border:1px solid var(--line);
  background:#fff;
  border-radius:10px;
  display:grid;
  place-items:center;
  overflow:hidden;
}
.rule-icon img{
  width:54px;
  height:54px;
  object-fit:contain;
}
.rule-placeholder{
  color:#7992a9;
  font-size:18px;
}
.rule-main{
  min-width:0;
}
.rule-row{
  display:flex;
  gap:8px;
  align-items:center;
}
.rule-row h3{
  font-size:14px;
  margin:0;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.source-link{
  margin-left:auto;
  border:0;
  background:transparent;
  color:var(--blue);
  padding:0;
  font-size:11px;
}
.meta-line{
  display:flex;
  flex-wrap:wrap;
  gap:5px;
  margin:7px 0;
}
.tag{
  display:inline-flex;
  align-items:center;
  border-radius:5px;
  padding:3px 6px;
  font-size:10px;
  background:#eef2f6;
  color:#526070;
}
.tag.mandatory{
  background:#feeceb;
  color:#a33;
}
.tag.cm{
  background:#fff2d5;
  color:#8a5b00;
}
.tag.ds{
  background:#e8f2fb;
  color:#235f90;
}
.tag.owner{
  background:#f0ebfb;
  color:#6c4b9b;
}
.tag.color{
  background:#edf6ec;
  color:#377749;
}
.rule-summary{
  font-size:11px;
  color:var(--muted);
  line-height:1.55;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
}
.detail-panel{
  overflow:auto;
}
.empty-detail{
  height:100%;
  display:grid;
  place-items:center;
  color:var(--muted);
  padding:30px;
  text-align:center;
}
.detail-content{
  padding:18px;
}
.detail-top{
  display:flex;
  gap:16px;
}
.detail-icon{
  width:100px;
  height:100px;
  border:1px solid var(--line);
  border-radius:12px;
  display:grid;
  place-items:center;
  flex:none;
  background:#fff;
}
.detail-icon img{
  width:82px;
  height:82px;
  object-fit:contain;
}
.detail-title{
  min-width:0;
}
.detail-title h3{
  margin:3px 0 7px;
  font-size:19px;
}
.detail-title .domain{
  font-size:11px;
  color:var(--muted);
}
.detail-actions{
  display:flex;
  gap:7px;
  margin-top:11px;
}
.btn{
  border:1px solid var(--line-2);
  background:#fff;
  color:#344155;
  border-radius:8px;
  padding:8px 10px;
  font-size:11px;
}
.btn.primary{
  background:var(--blue);
  color:#fff;
  border-color:var(--blue);
}
.fav.active{
  color:#d18b00;
  background:#fff6dc;
}
.detail-section{
  border-top:1px solid var(--line);
  padding-top:15px;
  margin-top:16px;
}
.detail-section h4{
  font-size:12px;
  margin:0 0 9px;
}
.info-card{
  border:1px solid var(--line);
  border-radius:9px;
  padding:12px;
  font-size:12px;
  line-height:1.7;
}
.info-card.source{
  background:var(--yellow-soft);
}
.info-card.design{
  background:var(--blue-soft);
}
.info-card.strategy{
  background:var(--green-soft);
}
.kv{
  border:1px solid var(--line);
  border-radius:8px;
  padding:9px;
}
.kv span{
  display:block;
  font-size:10px;
  color:var(--muted);
  margin-bottom:3px;
}
.kv b{
  font-size:11px;
}
.check-list{
  margin:0;
  padding-left:18px;
  font-size:12px;
  line-height:1.75;
}
.related{
  display:grid;
  gap:7px;
}
.related button{
  border:1px solid var(--line);
  background:#fff;
  border-radius:8px;
  padding:9px;
  text-align:left;
  font-size:11px;
}
.related button:hover{
  border-color:var(--blue);
  color:var(--blue);
}
.icon-toolbar{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:16px;
}
.search-box{
  border:1px solid var(--line-2);
  background:#fff;
  border-radius:9px;
  padding:10px 12px;
  min-width:260px;
  outline:0;
}
.select-box{
  border:1px solid var(--line-2);
  background:#fff;
  border-radius:9px;
  padding:9px;
}
.icon-grid{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:12px;
}
.icon-card{
  background:#fff;
  border:1px solid var(--line);
  border-radius:12px;
  padding:14px;
  cursor:pointer;
  transition:.18s;
}
.icon-card:hover{
  transform:translateY(-2px);
  box-shadow:var(--shadow);
  border-color:#a8c5df;
}
.icon-card h3{
  margin:0 0 5px;
  font-size:13px;
}
.icon-card p{
  margin:0;
  color:var(--muted);
  font-size:10px;
}
.icon-card .meta-line{
  margin-bottom:0;
}
.toc{
  margin-top:15px;
  border-top:1px solid var(--line);
  padding-top:12px;
}
.toc button{
  width:100%;
  border:0;
  background:transparent;
  text-align:left;
  padding:8px;
  border-radius:7px;
  color:#4f5c6e;
  font-size:11px;
}
.toc button:hover,.toc button.active{
  background:var(--blue-soft);
  color:#1d5f96;
}
.pdf-toolbar{
  border-bottom:1px solid var(--line);
  display:flex;
  align-items:center;
  padding:0 13px;
  gap:8px;
}
.pdf-toolbar b{
  font-size:12px;
}
.pdf-toolbar .page-badge{
  margin-left:auto;
  color:var(--muted);
  font-size:11px;
}
.pdf-frame{
  width:100%;
  height:100%;
  border:0;
  background:#e8edf2;
}
.assoc-list{
  display:grid;
  gap:7px;
}
.assoc-rule{
  border:1px solid var(--line);
  background:#fff;
  border-radius:8px;
  padding:10px;
  text-align:left;
}
.assoc-rule b{
  display:block;
  font-size:11px;
}
.assoc-rule span{
  font-size:10px;
  color:var(--muted);
}
.terms-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}
.term-section{
  background:#fff;
  border:1px solid var(--line);
  border-radius:12px;
  padding:20px;
}
.term-section h3{
  font-size:16px;
  margin:0 0 14px;
}
.term-list{
  display:grid;
  gap:10px;
}
.term-item{
  border:1px solid var(--line);
  border-radius:9px;
  padding:12px;
}
.term-item b{
  display:block;
  font-size:12px;
  margin-bottom:4px;
}
.term-item p{
  margin:0;
  color:var(--muted);
  font-size:11px;
  line-height:1.65;
}
.modal{
  position:fixed;
  inset:0;
  background:rgba(14,26,43,.48);
  z-index:20;
  display:grid;
  place-items:center;
  padding:28px;
}
.modal-card{
  width:min(860px,96vw);
  max-height:90vh;
  background:#fff;
  border-radius:14px;
  box-shadow:0 30px 80px rgba(0,0,0,.22);
  overflow:auto;
}
.modal-head{
  position:sticky;
  top:0;
  background:#fff;
  border-bottom:1px solid var(--line);
  padding:14px 18px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  z-index:1;
}
.modal-head b{
  font-size:14px;
}
.close-btn{
  border:0;
  background:#f1f4f7;
  border-radius:7px;
  width:32px;
  height:32px;
}
.modal-body{
  padding:20px;
}
.modal-body h2{
  margin:0 0 8px;
}
.toast{
  position:fixed;
  right:22px;
  bottom:22px;
  background:#172033;
  color:#fff;
  padding:11px 14px;
  border-radius:8px;
  font-size:12px;
  opacity:0;
  transform:translateY(10px);
  transition:.2s;
  z-index:30;
}
.toast.show{
  opacity:1;
  transform:none;
}
.empty-state{
  padding:50px;
  text-align:center;
  color:var(--muted);
}
@media (max-width:1250px){
  .library-layout{
    grid-template-columns:210px minmax(380px,1fr);
  }
  .detail-panel{
    display:none;
  }
  .icon-grid{
    grid-template-columns:repeat(4,1fr);
  }
  .domain-grid{
    grid-template-columns:repeat(4,1fr);
  }
}
@media (max-width:900px){
  .app{
    grid-template-columns:76px 1fr;
  }
  .brand h1,.brand small,.nav-btn span:not(.nav-ico),.side-meta{
    display:none;
  }
  .brand{
    justify-content:center;
    padding-left:0;
    padding-right:0;
  }
  .nav-btn{
    justify-content:center;
  }
  .view{
    padding:18px;
  }
  .stats{
    grid-template-columns:1fr 1fr;
  }
  .domain-grid{
    grid-template-columns:repeat(2,1fr);
  }
  .question-grid{
    grid-template-columns:1fr;
  }
  .library-layout{
    grid-template-columns:1fr;
  }
  .filter-panel{
    display:none;
  }
  .icon-grid{
    grid-template-columns:repeat(3,1fr);
  }
  .terms-grid{
    grid-template-columns:1fr;
  }
}
html,body{
  height:100%;
  overflow:hidden;
}
.app{
  height:100vh;
  height:100dvh;
  min-height:0;
  overflow:hidden;
}
.shell{
  height:100%;
  min-height:0;
  overflow:hidden;
}
.main{
  height:100%;
  min-height:0;
  overflow-y:auto;
  overflow-x:auto;
  overscroll-behavior-y:contain;
  -webkit-overflow-scrolling:touch;
  scrollbar-gutter:stable;
}

excelRow":66,"name":"避免与其他图文混淆","source":"GB 4094—2016 · 4.1.10","clause":"4.1.10","figure":"","original":"4.1.10 汽车上用于其他目的的图形文字不应与本标准规定的标志相混淆。","owner":"视觉组","collaborator":"交互组","keyPoints":"【法规效力】强制\n【规则主题】位置与可辨识性\n【关键约束】其他用途的图形文字不得与本标准标志混淆。","color":"未规定","check":"开展相似度检查；重点检查感叹号、灯光、制动、气囊等高风险语义。","page":6,"domain":"通用规则","icon":"","ruleLevel":"通用规则","applicableObject":"多对象／全部对象","regulationEffect":"强制","ruleTopic":"位置与可辨识性","ruleTopics":["位置与可辨识性"],"controlMarkRequirement":"/","displayObligation":"通用设计规则","durationRule":"/","spaceStrategy":"/","relationSummary":"/"},{"id":"rule-060","excelRow":67,"name":"使用手册说明","source":"GB 4094—2016 · 4.1.11","clause":"4.1.11","figure":"","original":"4.1.11 汽车上按照5.1及5.2的规定标示的所有操纵件、指示器、信号装置的标志，都应在汽车使用手册中说明。","owner":"交互组","collaborator":"视觉组","keyPoints":"【法规效力】强制\n【规则主题】文档与说明\n【关键约束】所有按5.1和5.2标示的操纵件、指示器和信号装置图标，都应在使用手册中说明。","color":"未规定","check":"手册名称、图形、颜色、触发条件与实车一致。","page":6,"domain":"通用规则","icon":"","ruleLevel":"通用规则","applicableObject":"操纵件＋指示器＋信号装置","regulationEffect":"强制","ruleTopic":"文档与说明","ruleTopics":["文档与说明"],"controlMarkRequirement":"/","displayObligation":"通用设计规则","durationRule":"/","spaceStrategy":"/","relationSummary":"【明确引用】第5.1节与第5.2节全部标志"},{"id":"rule-061","excelRow":68,"name":"允许修改的范围","source":"GB 4094—2016 · 4.1.12","clause":"4.1.12","figure":"","original":"4.1.12 本标准规定的标志仅限于以下情况的修改，修改时应遵从附录B的原则，不应改变标志的基本构成要素，不应影响使用时的可辨认性：对线条的粗细、间隙、图形的比例、弧线弧度、导角等细节进行调整；对标志的轮廓进行着色、图形的虚实进行调整、着色（标准要求中已明确禁止的除外）。","owner":"视觉组","collaborator":"交互组、3D组","keyPoints":"【法规效力】强制\n【规则主题】修改边界；图形构成\n【关键约束】只允许调整线宽、间隙、比例、弧度、导角、轮廓着色、虚实和着色等细节。","color":"未规定","check":"每个变体需能追溯到标准母版；做小尺寸、日夜模式和多屏验证。","page":6,"domain":"通用规则","icon":"","ruleLevel":"通用规则","applicableObject":"多对象／全部对象","regulationEffect":"强制","ruleTopic":"修改边界；图形构成","ruleTopics":["修改边界","图形构成"],"controlMarkRequirement":"/","displayObligation":"通用设计规则","durationRule":"/","spaceStrategy":"/","relationSummary":"【明确引用】附录B"},{"id":"rule-062","excelRow":69,"name":"共用空间信息可访问","source":"GB 4094—2016 · 4.1.13 第1项","clause":"4.1.13 第1项","figure":"","original":"4.1.13 显示多种信息的共用空间应符合以下要求：共用空间内的信号装置和指示器在其所表示的功能状况启动时都应提供相关的信息。","owner":"交互组","collaborator":"动效组、视觉组","keyPoints":"【法规效力】强制\n【规则主题】信息呈现与调度\n【关键约束】共用空间内的信号装置和指示器，在对应功能状态启动时都必须提供相关信息。","color":"未规定","check":"触发后规定时间内可见；驾驶员可理解当前状态。","page":6,"domain":"通用规则","icon":"","ruleLevel":"通用规则","applicableObject":"指示器＋信号装置","regulationEffect":"强制","ruleTopic":"信息呈现与调度","ruleTopics":["信息呈现与调度"],"controlMarkRequirement":"/","displayObligation":"通用设计规则","durationRule":"状态有效时必须提供","spaceStrategy":"普通共用空间","relationSummary":"/"},{"id":"rule-063","excelRow":70,"name":"多信号轮播/查看","source":"GB 4094—2016 · 4.1.13 第2项","clause":"4.1.13 第2项","figure":"","original":"4.1.13 当两个或多个信号装置被激活时，信息应按序自动重复，或由驾驶员选择查看。","owner":"动效组","collaborator":"交互组、视觉组","keyPoints":"【法规效力】强制\n【规则主题】信息呈现与调度\n【关键约束】两个或多个信号同时激活时，应按序自动重复显示，或允许驾驶员选择查看。","color":"未规定","check":"定义轮播顺序、停留时间、切换方式和手动查看入口。","page":6,"domain":"通用规则","icon":"","ruleLevel":"通用规则","applicableObject":"信号装置","regulationEffect":"强制","ruleTopic":"信息呈现与调度","ruleTopics":["信息呈现与调度"],"controlMarkRequirement":"/","displayObligation":"通用设计规则","durationRule":"可轮显／查看","spaceStrategy":"普通共用空间","relationSummary":"/"},{"id":"rule-064","excelRow":71,"name":"四类关键图标不得互相共用","source":"GB 4094—2016 · 4.1.13 第3项","clause":"4.1.13 第3项","figure":"","original":"4.1.13 制动系统故障、前照灯远光、转向信号灯及安全带警报的信号装置不应被设定在同一共用空间内显示。","owner":"交互组","collaborator":"动效组、视觉组","keyPoints":"【法规效力】强制\n【规则主题】信息呈现与调度\n【关键约束】制动系统故障、前照灯远光、转向信号灯、安全带警报不得设置在同一共用空间内。","color":"未规定","check":"为四类关键状态提供彼此独立的可显示能力。","page":6,"domain":"通用规则","icon":"","ruleLevel":"通用规则","applicableObject":"关键状态信号装置","regulationEffect":"强制","ruleTopic":"信息呈现与调度","ruleTopics":["信息呈现与调度"],"controlMarkRequirement":"/","displayObligation":"通用设计规则","durationRule":"/","spaceStrategy":"关键状态槽位隔离","relationSummary":"/"},{"id":"rule-065","excelRow":72,"name":"关键图标进入共用空间时独占","source":"GB 4094—2016 · 4.1.13 第4项","clause":"4.1.13 第4项","figure":"","original":"4.1.13 如果制动系统故障、前照灯远光、转向信号灯及安全带警报的信号装置的其中某一个被设定在某一共用空间内显示，那么在其显示时，该信号装置应替换掉该共用空间内的其他任何信息。","owner":"交互组","collaborator":"动效组、视觉组","keyPoints":"【法规效力】强制\n【规则主题】信息呈现与调度\n【关键约束】若四类关键图标中的任一项被放入共用空间，激活时必须替换该空间内其他任何信息。","color":"未规定","check":"验证关键状态触发后的立即抢占与恢复逻辑。","page":6,"domain":"通用规则","icon":"","ruleLevel":"通用规则","applicableObject":"关键状态信号装置","regulationEffect":"强制","ruleTopic":"信息呈现与调度","ruleTopics":["信息呈现与调度"],"controlMarkRequirement":"/","displayObligation":"通用设计规则","durationRule":"/","spaceStrategy":"共用空间内抢占独占","relationSummary":"/"},{"id":"rule-066","excelRow":73,"name":"关键图标不可取消","source":"GB 4094—2016 · 4.1.13 第5项","clause":"4.1.13 第5项","figure":"","original":"4.1.13 制动系统故障、前照灯远光、转向信号灯及安全带警报的信号装置不应自动取消或被驾驶员手动取消。","owner":"交互组","collaborator":"动效组","keyPoints":"【法规效力】强制\n【规则主题】信息呈现与调度\n【关键约束】制动故障、远光、转向、安全带警报在激活期间不得自动取消，也不得由驾驶员手动取消。","color":"未规定","check":"覆盖所有退出路径、页面跳转和休眠唤醒场景。","page":6,"domain":"通用规则","icon":"","ruleLevel":"通用规则","applicableObject":"关键状态信号装置","regulationEffect":"强制","ruleTopic":"信息呈现与调度","ruleTopics":["信息呈现与调度"],"controlMarkRequirement":"/","displayObligation":"通用设计规则","durationRule":"持续至状态解除（不可取消）","spaceStrategy":"/","relationSummary":"/"},{"id":"rule-067","excelRow":74,"name":"共用空间颜色例外","source":"GB 4094—2016 · 4.1.13 第6项","clause":"4.1.13 第6项","figure":"","original":"4.1.13 除非在某一具体（其他）的标准中有规定，否则当信号装置出现在共用空间内时，有关信号装置的颜色不做要求。","owner":"视觉组","collaborator":"交互组","keyPoints":"【法规效力】强制\n【规则主题】颜色规定；适用性与例外\n【关键约束】除非其他具体标准另有规定，信号装置出现在共用空间时，颜色不作要求。","color":"未规定","check":"评审时记录是否属于共用空间，以及是否存在其他专项标准。","page":6,"domain":"通用规则","icon":"","ruleLevel":"通用规则","applicableObject":"信号装置","regulationEffect":"强制","ruleTopic":"颜色规定；适用性与例外","ruleTopics":["颜色规定","适用性与例外"],"controlMarkRequirement":"/","displayObligation":"通用设计规则","durationRule":"/","spaceStrategy":"普通共用空间","relationSummary":"/"},{"id":"rule-068","excelRow":75,"name":"不同状态可使用其他颜色","source":"GB 4094—2016 · 4.2.1","clause":"4.2.1","figure":"","original":"4.2.1 本标准中5.1和5.2给出的信号装置标志，除了应符合其相应条款规定使用的颜色外，允许根据不同的功能需要，使用4.2.2规定的其他颜色来表达不同的工作状况或含义。","owner":"视觉组","collaborator":"交互组","keyPoints":"【法规效力】推荐／允许\n【规则主题】颜色规定；适用性与例外\n【关键约束】除条款规定颜色外，可按不同功能状态使用4.2.2中的其他颜色表达不同含义。","color":"未规定","check":"建立“图标×状态×颜色”矩阵并跨屏一致。","page":7,"domain":"通用规则","icon":"","ruleLevel":"通用规则","applicableObject":"信号装置","regulationEffect":"推荐／允许","ruleTopic":"颜色规定；适用性与例外","ruleTopics":["颜色规定","适用性与例外"],"controlMarkRequirement":"/","displayObligation":"通用设计规则","durationRule":"/","spaceStrategy":"/","relationSummary":"【明确引用】4.2.2"},{"id":"rule-069","excelRow":76,"name":"红色含义","source":"GB 4094—2016 · 4.2.2","clause":"4.2.2","figure":"","original":"4.2.2 颜色的含义：红色——危及人身安全的，或易对设备、系统造成严重损害的，紧急的或紧迫的。","owner":"视觉组","collaborator":"交互组","keyPoints":"【法规效力】推荐／允许\n【规则主题】颜色语义\n【颜色】红色\n【关键约束】红色用于危及人身安全、可能严重损害设备/系统、紧急或紧迫状态。","color":"红色","check":"风险等级与红色使用一致，避免红色泛化。","page":7,"domain":"通用规则","icon":"","ruleLevel":"通用规则","applicableObject":"信号装置","regulationEffect":"推荐／允许","ruleTopic":"颜色语义","ruleTopics":["颜色语义"],"controlMarkRequirement":"/","displayObligation":"通用设计规则","durationRule":"/","spaceStrategy":"/","relationSummary":"/"},{"id":"rule-070","excelRow":77,"name":"黄色/琥珀色含义","source":"GB 4094—2016 · 4.2.2","clause":"4.2.2","figure":"","original":"4.2.2 颜色的含义：黄色或琥珀色——需要引起注意的，非正常的操作限制，汽车系统故障，可能导致汽车损害，或其他将来可能导致危险的情况。","owner":"视觉组","collaborator":"交互组","keyPoints":"【法规效力】推荐／允许\n【规则主题】颜色语义\n【颜色】黄色／琥珀色\n【关键约束】黄色或琥珀色用于需注意、非正常操作限制、系统故障或潜在危险。","color":"黄色／琥珀色","check":"验证风险等级、文案语气和颜色一致。","page":7,"domain":"通用规则","icon":"","ruleLevel":"通用规则","applicableObject":"信号装置","regulationEffect":"推荐／允许","ruleTopic":"颜色语义","ruleTopics":["颜色语义"],"controlMarkRequirement":"/","displayObligation":"通用设计规则","durationRule":"/","spaceStrategy":"/","relationSummary":"/"},{"id":"rule-071","excelRow":78,"name":"绿色含义","source":"GB 4094—2016 · 4.2.2","clause":"4.2.2","figure":"","original":"4.2.2 颜色的含义：绿色——安全的，正常的操作方式或工作状态。","owner":"视觉组","collaborator":"交互组","keyPoints":"【法规效力】推荐／允许\n【规则主题】颜色语义\n【颜色】绿色\n【关键约束】绿色用于安全、正常操作方式或正常工作状态。","color":"绿色","check":"检查正常激活状态与故障状态的颜色区分。","page":7,"domain":"通用规则","icon":"","ruleLevel":"通用规则","applicableObject":"信号装置","regulationEffect":"推荐／允许","ruleTopic":"颜色语义","ruleTopics":["颜色语义"],"controlMarkRequirement":"/","displayObligation":"通用设计规则","durationRule":"/","spaceStrategy":"/","relationSummary":"/"},{"id":"rule-072","excelRow":79,"name":"温度颜色","source":"GB 4094—2016 · 4.2.3","clause":"4.2.3","figure":"","original":"4.2.3 对于表示温度、冷热的相关标志，红色应表示温度高或热，蓝色应表示温度低或冷。","owner":"视觉组","collaborator":"交互组","keyPoints":"【法规效力】推荐／允许\n【规则主题】颜色语义\n【颜色】红色／蓝色\n【关键约束】温度高或热用红色，温度低或冷用蓝色。","color":"红色／蓝色","check":"空调、座椅温度、发动机温度等保持统一映射。","page":7,"domain":"通用规则","icon":"","ruleLevel":"通用规则","applicableObject":"多对象／全部对象","regulationEffect":"推荐／允许","ruleTopic":"颜色语义","ruleTopics":["颜色语义"],"controlMarkRequirement":"/","displayObligation":"通用设计规则","durationRule":"/","spaceStrategy":"/","relationSummary":"/"},{"id":"rule-073","excelRow":80,"name":"白/黑中性色","source":"GB 4094—2016 · 4.2.4","clause":"4.2.4","figure":"","original":"4.2.4 若上述条件不适用，可以使用与背景色差距明显的白色或黑色。","owner":"视觉组","collaborator":"交互组","keyPoints":"【法规效力】推荐／允许\n【规则主题】颜色语义；适用性与例外\n【颜色】白色／黑色\n【关键约束】当红黄绿及冷热颜色语义不适用时，可使用与背景反差明显的白色或黑色。","color":"白色／黑色","check":"日夜主题、强光和低亮度场景均应清晰。","page":7,"domain":"通用规则","icon":"","ruleLevel":"通用规则","applicableObject":"多对象／全部对象","regulationEffect":"推荐／允许","ruleTopic":"颜色语义；适用性与例外","ruleTopics":["颜色语义","适用性与例外"],"controlMarkRequirement":"/","displayObligation":"通用设计规则","durationRule":"/","spaceStrategy":"/","relationSummary":"/"},{"id":"rule-074","excelRow":81,"name":"驾驶员可识别位置","source":"GB 4094—2016 · 4.3.1","clause":"4.3.1","figure":"","original":"4.3.1 本标准规定的标志，应保证驾驶员在相应位置上能够识别。该相应位置为：驾驶员位于驾驶位置上，并根据制造商的使用说明调整后，可在碰撞约束系统的保护下自由地活动的位置。","owner":"交互组","collaborator":"视觉组","keyPoints":"【法规效力】强制\n【规则主题】位置与可辨识性\n【关键约束】驾驶员按制造商说明调整座椅并处于约束系统保护范围内时，应能识别相应标志。","color":"未规定","check":"用最小/最大人体、座椅位置和方向盘调节范围验证可视性。","page":7,"domain":"通用规则","icon":"","ruleLevel":"通用规则","applicableObject":"操纵件＋指示器＋信号装置","regulationEffect":"强制","ruleTopic":"位置与可辨识性","ruleTopics":["位置与可辨识性"],"controlMarkRequirement":"/","displayObligation":"通用设计规则","durationRule":"/","spaceStrategy":"/","relationSummary":"/"},{"id":"rule-075","excelRow":84,"name":"标志位于控件上或邻近","source":"GB 4094—2016 · 4.3.2","clause":"4.3.2","figure":"","original":"4.3.2 操纵件、指示器及信号装置的标志应位于其上或邻近。对于多功能操纵件，标志不要求邻近，但应尽量靠近。","owner":"交互组","collaborator":"视觉组","keyPoints":"【法规效力】强制\n【规则主题】位置与可辨识性\n【关键约束】标志应位于对应装置上或邻近；多功能操纵件可不严格邻近，但应尽量靠近。","color":"未规定","check":"检查视觉归属、点击热区、成组关系和多功能控件标识距离。","page":7,"domain":"通用规则","icon":"","ruleLevel":"通用规则","applicableObject":"操纵件＋指示器＋信号装置","regulationEffect":"强制","ruleTopic":"位置与可辨识性","ruleTopics":["位置与可辨识性"],"controlMarkRequirement":"/","displayObligation":"通用设计规则","durationRule":"/","spaceStrategy":"控件上或邻近","relationSummary":"/"},{"id":"rule-076","excelRow":85,"name":"标准图形网格与几何基准","source":"GB 4094—2016 · 附录A","clause":"附录A","figure":"","original":"附录A 汽车操纵件、指示器及信号装置的标志基本图型构成见图A.1。图形由75 mm最大边界正方形、50 mm基准正方形、基准圆、矩形、旋转45°正方形及八角形等几何基准构成。","owner":"视觉组","collaborator":"3D组","keyPoints":"【法规效力】强制\n【规则主题】图形构成\n【关键约束】标准图形以75 mm最大边界、50 mm基准方形、基准圆/矩形/八角形等构成。","color":"未规定","check":"保留矢量母版、网格和版本记录。","page":23,"domain":"附录规范","icon":"","ruleLevel":"附录原则","applicableObject":"多对象／全部对象","regulationEffect":"强制","ruleTopic":"图形构成","ruleTopics":["图形构成"],"controlMarkRequirement":"/","displayObligation":"通用设计规则","durationRule":"/","spaceStrategy":"/","relationSummary":"/"},{"id":"rule-077","excelRow":86,"name":"线条、间隙、符号与箭头","source":"GB 4094—2016 · 附录B 第1段","clause":"附录B 第1段","figure":"","original":"附录B 应仔细考虑标志的线条粗细、线间隙、符号和箭头形状等，设计者应查阅并参考IEC 80416-1、ISO 80416-2、IEC 80416-3及ISO 80416-4等标准。","owner":"视觉组","collaborator":"交互组","keyPoints":"【法规效力】推荐／允许\n【规则主题】图形构成；标准引用\n【关键约束】应仔细考虑线宽、线间隙、符号与箭头形状，并参考IEC/ISO 80416系列。","color":"未规定","check":"最小尺寸像素测试、视距测试、箭头方向一致性测试。","page":24,"domain":"附录规范","icon":"","ruleLevel":"附录原则","applicableObject":"多对象／全部对象","regulationEffect":"推荐／允许","ruleTopic":"图形构成；标准引用","ruleTopics":["图形构成","标准引用"],"controlMarkRequirement":"/","displayObligation":"通用设计规则","durationRule":"/","spaceStrategy":"/","relationSummary":"【外部标准引用】IEC 80416-1、ISO 80416-2、IEC 80416-3、ISO 80416-4"},{"id":"rule-078","excelRow":87,"name":"整车外形应接近真实车辆","source":"GB 4094—2016 · 附录B 第2段","clause":"附录B 第2段","figure":"","original":"附录B 对于用来表示汽车整体的标志，标志的外形轮廓应尽量和真实车辆外形保持一致。","owner":"3D组","collaborator":"视觉组","keyPoints":"【法规效力】推荐／允许\n【规则主题】图形构成\n【关键约束】表示汽车整体的图标，外形轮廓应尽量与真实车辆外形一致。","color":"未规定","check":"输出标准化车辆轮廓资产，并与2D视觉共同审查。","page":24,"domain":"附录规范","icon":"","ruleLevel":"附录原则","applicableObject":"多对象／全部对象","regulationEffect":"推荐／允许","ruleTopic":"图形构成","ruleTopics":["图形构成"],"controlMarkRequirement":"/","displayObligation":"通用设计规则","durationRule":"/","spaceStrategy":"/","relationSummary":"/"},{"id":"rule-079","excelRow":88,"name":"车辆方向约定","source":"GB 4094—2016 · 附录B 第3段","clause":"附录B 第3段","figure":"","original":"附录B 对于用来表示汽车整体或部分形状的标志，侧视图中汽车前进方向应朝向左方，俯视图中汽车前进方向应朝向上方。","owner":"3D组","collaborator":"视觉组","keyPoints":"【法规效力】推荐／允许\n【规则主题】图形构成\n【关键约束】侧视图车辆前进方向应朝左；俯视图车辆前进方向应朝上。","color":"未规定","check":"检查所有车型轮廓、动画首帧和异常轮胎定位方向。","page":24,"domain":"附录规范","icon":"","ruleLevel":"附录原则","applicableObject":"多对象／全部对象","regulationEffect":"推荐／允许","ruleTopic":"图形构成","ruleTopics":["图形构成"],"controlMarkRequirement":"/","displayObligation":"通用设计规则","durationRule":"/","spaceStrategy":"/","relationSummary":"/"},{"id":"rule-080","excelRow":89,"name":"字母数字与既有要素复用","source":"GB 4094—2016 · 附录B 第4～5段","clause":"附录B 第4～5段","figure":"","original":"附录B 字母和数字允许作为标志的要素。允许用合乎逻辑的方式使用本标准中已规定的标志或标志中包含的要素，使用时应考虑与已有的相关标志保持关联性。","owner":"视觉组","collaborator":"交互组","keyPoints":"【法规效力】推荐／允许\n【规则主题】图形构成；标识配置与完整性\n【关键约束】字母和数字可作为标志要素；可合理复用本标准已有标志或元素，并保持关联性。","color":"未规定","check":"检查字符可读性、语义关联和跨语言一致性。","page":24,"domain":"附录规范","icon":"","ruleLevel":"附录原则","applicableObject":"多对象／全部对象","regulationEffect":"推荐／允许","ruleTopic":"图形构成；标识配置与完整性","ruleTopics":["图形构成","标识配置与完整性"],"controlMarkRequirement":"/","displayObligation":"通用设计规则","durationRule":"/","spaceStrategy":"/","relationSummary":"/"}];

const lawColorWords=new Set(['无颜色要求','红色','黄色','琥珀色','绿色','蓝色','白色','黑色']);
function highlightRegText(text){
  const pattern=/(无颜色要求|黄色或琥珀色|红色|黄色|琥珀色|绿色|蓝色|白色|黑色|不得|不应|必须|应当|应为|不强制|可不|不需要|允许|建议|可以|应)/g;
  return esc(text).replace(pattern,m=>{
    if(lawColorWords.has(m)||m==='黄色或琥珀色'){
      const cls=/红/.test(m)?'color-red':/黄|琥珀/.test(m)?'color-yellow':/绿/.test(m)?'color-green':/蓝/.test(m)?'color-blue':'color-neutral';
      return `<mark class="law-key law-color ${cls}">${m}</mark>`;
    }
    return `<mark class="law-key law-strength">${m}</mark>`;
  });
}
function highlightOriginalText(text){
  const escaped=esc(text);
  const pattern=/(?:无颜色要求|黄色或琥珀色|红色|黄色|琥珀色|绿色|蓝色|白色|黑色|不得|不应|必须|应当|应为|不强制|可不|不需要|允许|建议|可以|如果|若|当(?=[^，。；：]{0,18}时)|应)/g;
  const legalNext=/^(符合|遵从|采用|使用|位于|具有|提供|保持|显示|标示|标识|说明|替换|设置|按|为|有|在|由|与|根据|通过|永久|清晰|全部|同时|分别|单独|满足|开启|关闭|点亮|熄灭|工作|呈现|选择|取消|配备|装备|放置|安装|邻近|可见|识别|表明|包括|具备|置于|置在|按照|参照|处于|重复|自动|手动)/;
  return escaped.replace(pattern,(m,offset,whole)=>{
    if(m==='应'){
      const prev=whole[offset-1]||'';
      const next=whole.slice(offset+1);
      if('相对响适'.includes(prev)||!legalNext.test(next))return m;
    }
    if(lawColorWords.has(m)||m==='黄色或琥珀色'){
      const cls=/红/.test(m)?'color-red':/黄|琥珀/.test(m)?'color-yellow':/绿/.test(m)?'color-green':/蓝/.test(m)?'color-blue':'color-neutral';
      return `<mark class="law-key law-color ${cls}">${m}</mark>`;
    }
    if(m==='如果'||m==='若'||m.startsWith('当'))return `<mark class="law-key law-condition">${m}</mark>`;
    return `<mark class="law-key law-strength">${m}</mark>`;
  });
}

function filterOptions(def){return def.options?def.options():[]}
function filterDefMatches(rule,def,set){
  if(!set.size)return true;
  const options=filterOptions(def);
  return [...set].some(value=>{
    const option=options.find(o=>o.value===value);
    if(option)return option.match(rule);
    const actual=def.get?def.get(rule):rule[def.key];
    return Array.isArray(actual)?actual.includes(value):actual===value;
  });
}

function filteredRules(){
  const q=normalize(state.search||$('#globalSearch').value);let arr=DESIGN_RULES.filter(r=>{if(state.onlyFavorites&&!state.favorites.has(r.id))return false;if(q&&!ruleHaystack(r).includes(q))return false;return filterDefs.every(d=>filterDefMatches(r,d,state.filters[d.key]))});

  else if(state.sort==='duty')arr.sort((a,b)=>(a.displayObligation||'').localeCompare(b.displayObligation||'','zh-CN')||sourceOrder(a)-sourceOrder(b));
  else if(state.sort==='space')arr.sort((a,b)=>(a.spaceStrategy||'').localeCompare(b.spaceStrategy||'','zh-CN')||sourceOrder(a)-sourceOrder(b));

      ['指示器 indicator','用刻度值、数字显示等物理特性幅度显示汽车及部件工作状况的装置。'],
      ['信号装置 tell-tale','点亮时表示装置激活、功能或条件正常／失效，或者某种功能故障的光信号。'],
      ['共用空间 common space','可以不同步显示两种或多种信息功能的区域。'],
      ['四类关键状态','制动系统故障、前照灯远光、转向信号灯和安全带警报不得彼此设置在同一共用空间；若进入共用空间，显示时抢占其他信息，状态解除前不可取消。']
    ]},
    {title:'使用边界',type:'internal',badge:'避免过度解读',items:[
      ['直接规定与关联分开','本条原文、明确引用、条件适用和通用继承分别展示。'],
      ['条件不可无条件化','只有适用条件成立时，关联规则才参与综合设计结论。'],
      ['独占不等于永久专位','独占表示激活期间独占共用空间，不代表法规要求永久预留固定物理槽位。'],
      ['跨法规综合判断','同一图标在其他法规中可能有更严格要求，最终结论应按全部适用法规综合。']
    ]}
  ];
  const renderSection=(s,extra='')=>`<section class="term-section ${s.type} ${extra}"><h3>${esc(s.title)}<span class="${s.type==='official'?'official-badge':'internal-badge'}">${esc(s.badge)}</span></h3><div class="term-list">${s.items.map(([k,v])=>`<div class="term-item"><b>${esc(k)}</b><p>${highlightRegText(v)}</p></div>`).join('')}</div></section>`;
  const [quick,...reference]=sections;
  $('#termsGrid').innerHTML=renderSection(quick,'quick-start-section')+`<details class="guide-reference"><summary><div>详细术语与判断依据<br><span>按需查看显示义务、法规效力、持续规则、空间策略和法规术语</span></div></summary><div class="guide-reference-grid">${reference.map(s=>renderSection(s)).join('')}</div></details>`;
}
const mainScroller=$('.main'),backToTop=$('#backToTop');
if(mainScroller&&backToTop){
  mainScroller.addEventListener('scroll',()=>backToTop.classList.toggle('visible',state.view==='rules'&&mainScroller.scrollTop>260),{passive:true});
  backToTop.addEventListener('click',()=>mainScroller.scrollTo({top:0,left:0,behavior:'smooth'}));
}
initHome();viewInited.home=true;
